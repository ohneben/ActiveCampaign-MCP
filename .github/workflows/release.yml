name: Release

# Publishes a GitHub Release automatically whenever a version tag (v*.*.*) is
# pushed. Release notes are generated from the commits/PRs since the last tag.

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            An unofficial, self-hosted ActiveCampaign MCP server — the full
            account API (v3 + SMS + WhatsApp + Segments) exposed as
            safety-categorized MCP tools, over stdio or a Streamable-HTTP
            endpoint any MCP client can connect to. See the README for setup;
            a container image for this tag is published to GHCR.
